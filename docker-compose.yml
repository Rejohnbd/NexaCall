# Services (Which run in container)
services:
  # ============================================
  # NestJS Backend Service
  # ============================================
  backend:
    build: # How to build image
      context: ./backend # Dockerfile is located in this folder
      dockerfile: Dockerfile # Dockerfile name
      target: development # IMPORTANT: Use 'development' stage (not 'builder' or 'production')
    container_name: nexacall-backend # Container name
    restart: unless-stopped # Auto restart policy
    ports: # Port mapping (host:container)
      - '8000:3000' # Host 8000 → Container 3000
      - '40000-40100:40000-40100/udp' # MediaSoup RTC UDP
      - '40000-40100:40000-40100/tcp' # MediaSoup RTC TCP
    environment: # Environment variables
      - NODE_ENV=development
      - PORT=3000 # Container port 3000
      # For Nginx
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=nexacall_user
      - DB_PASSWORD=nexacall_password
      - DB_NAME=nexacall_db
      - JWT_SECRET=nexacall-secret
      - JWT_REFRESH_SECRET=nexacall-refresh-secret
      - FRONTEND_URL=https://103.113.13.2
    volumes:
      # ============================================
      # Volume mounting for hot-reload (development)
      # ============================================
      # Mount entire backend folder (so all code changes reflect)
      - ./backend:/app
      # IMPORTANT: Keep container's node_modules (don't overwrite with local)
      - /app/node_modules
    networks:
      - nexacall-network # Which network to join

  # ============================================
  # Next.js Frontend Service
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: nexacall-frontend
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=development
      - PORT=3000
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - WATCHPACK_POLLING_INTERVAL=1000
      # For Nginx
      - NEXT_PUBLIC_API_URL=https://103.113.13.2/api
      - NEXT_PUBLIC_WS_URL=wss://103.113.13.2
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - nexacall-network

  # ============================================
  # Nginx Reverse Proxy (Frontend এর জন্য)
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: nexacall-nginx
    restart: unless-stopped
    ports:
      - '80:80' # Port 80
      - '443:443' # Port 443 for SSL
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - nexacall-network

  # ============================================
  # PostgreSQL Database Service
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: nexacall-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=nexacall_user
      - POSTGRES_PASSWORD=nexacall_password
      - POSTGRES_DB=nexacall_db
      - PGDATA=/var/lib/postgresql/data/pgdata
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/init:/docker-entrypoint-initdb.d # Optional
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nexacall_user -d nexacall_db']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - nexacall-network

  # ============================================
  # pgAdmin - Web-based Database Management
  # ============================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: nexacall-pgadmin
    restart: unless-stopped
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@nexacall.com
      - PGADMIN_DEFAULT_PASSWORD=admin123
      - PGADMIN_CONFIG_SERVER_MODE=True
    ports:
      - '5050:80'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nexacall-network

# ============================================
# Volumes (Persistent data storage)
# ============================================
volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local
  node_modules:
    driver: local

# Networks (Outside the services)
networks:
  nexacall-network:
    driver: bridge # Bridge driver
